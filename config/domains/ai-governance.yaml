{
  "org": "ai-governance-curriculum",
  "default_remote": "git@github.com:ai-governance-curriculum/{repo}.git",
  "release": {
    "tag_format": "v%Y.%m",
    "branch": "main",
    "package_workflow": "release-package.yml"
  },
  "quality_judge": {
    "enabled": false,
    "flag_only": true,
    "agent_command": "{runner}/scripts/run-claude-judge.sh --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id} --artifact {artifact}",
    "thresholds": {
      "default": 70,
      "freshness": 76
    },
    "dimensions": [
      "correctness",
      "clarity",
      "source_quality",
      "depth"
    ],
    "timeout_seconds": 300,
    "freshness_cooldown_days": 90
  },
  "pipeline": {
    "phases": {
      "author": false,
      "reaudit_autofix": false,
      "research_autopromote": false,
      "retire": false,
      "package": false
    },
    "daily_budget": 8,
    "rotation_days": 90,
    "reaudit_slice": 30
  },
  "extra_repos": [
    {
      "name": ".github",
      "kind": "org-profile",
      "release": false
    }
  ],
  "maintained_by": {
    "_comment": "Project maintainership attribution. Used by aicg org rebrand to write the footer, and by the audits to treat references to these orgs as legitimate (not 'orphan'). Distinct from the source policy for curriculum content \u2014 those rules are unchanged.",
    "name": "VeriSwarm.ai",
    "url": "https://veriswarm.ai",
    "phrasing": "Maintained by [VeriSwarm.ai](https://veriswarm.ai)",
    "footer_marker": "<!-- aicg:maintained-by -->"
  },
  "documentation": {
    "format_guard_files": [
      "CURRICULUM.md",
      "CURRICULUM_INDEX.md",
      "README.md",
      "VERSIONS.md"
    ],
    "org_readme_repo": ".github",
    "org_readme_files": [
      "README.md",
      "profile/README.md"
    ]
  },
  "schedules": {
    "monthly_release": "0 2 1 * *",
    "monthly_research": "30 5 1 3,6,9,12 *",
    "weekly_audit": "0 3 * * 0",
    "daily_remediate": "0 * * * *",
    "daily_issues": "20 4 * * *",
    "daily_steward": "40 4 * * *",
    "daily_discussions": "0 5 * * *",
    "monthly_review": "0 6 1 3,6,9,12 *"
  },
  "automation": {
    "state_dir": ".aicg/org",
    "lock_name": "aicg-org.lock",
    "auto_merge": false,
    "max_daily_work_items": 1,
    "_comment_daily_drain": "True = drain queue per tick until empty / wall-clock cap; False = exactly one item per tick.",
    "daily_drain": false,
    "agent": {
      "provider": "openai",
      "model": "codex-gpt-5.5",
      "interface": "local_cli_subscription",
      "agent_command": "{runner}/scripts/run-codex-control.sh --model codex-gpt-5.5 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}",
      "purpose": "repo orchestration, audits, validation, PR/issue/discussion stewardship, and scheduler control"
    }
  },
  "content_generation": {
    "agent": {
      "provider": "anthropic",
      "model": "claude-opus-4-7",
      "interface": "local_cli_subscription",
      "purpose": "curriculum, solution, job-requirement, and supplemental content generation",
      "agent_command": "{runner}/scripts/run-claude-content.sh --model claude-opus-4-7 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}"
    }
  },
  "job_requirements": {
    "ownership_strategy": "lowest_level_role",
    "markdown_file": "JOB_REQUIREMENTS.md",
    "structured_file": ".aicg/job-requirements.json",
    "supplemental_dir": "supplemental"
  },
  "research": {
    "agent": {
      "provider": "anthropic",
      "model": "claude-opus-4-7",
      "interface": "local_cli_subscription",
      "purpose": "quarterly job-market research with web tools enabled",
      "agent_command": "{runner}/scripts/run-claude-research.sh --model claude-opus-4-7 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}"
    },
    "minimum_postings_per_role": 25,
    "source_window_days": 90,
    "caps": {
      "_comment": "Per role, per research run. Anything above the cap is rejected with a 'cap_exceeded' reason and surfaced in the proposal PR so a human can decide whether to raise the cap or trim the list.",
      "max_modules_per_run": 1,
      "max_exercises_per_run": 3,
      "max_projects_per_run": 0
    },
    "min_evidence_count": 3,
    "min_evidence_window_days": 90
  },
  "roles": [
    {
      "id": "ai-governance-analyst",
      "title": "AI Governance Analyst",
      "level": 15,
      "learning_repo": "ai-governance-analyst-learning",
      "solution_repo": "ai-governance-analyst-solutions",
      "aliases": [
        "AI Governance Analyst",
        "AI Policy Analyst",
        "Responsible AI Analyst",
        "AI Compliance Analyst"
      ]
    },
    {
      "id": "ai-risk-engineer",
      "title": "AI Risk Engineer",
      "level": 25,
      "learning_repo": "ai-risk-engineer-learning",
      "solution_repo": "ai-risk-engineer-solutions",
      "aliases": [
        "AI Risk Engineer",
        "ML Risk Engineer",
        "Responsible AI Engineer",
        "AI Assurance Engineer"
      ]
    },
    {
      "id": "ai-evaluation-engineer",
      "title": "AI Evaluation Engineer",
      "level": 35,
      "learning_repo": "ai-evaluation-engineer-learning",
      "solution_repo": "ai-evaluation-engineer-solutions",
      "aliases": [
        "AI Evaluation Engineer",
        "Model Evaluation Engineer",
        "LLM Evaluation Engineer",
        "AI Test & Evaluation Engineer"
      ]
    },
    {
      "id": "security",
      "title": "AI/ML Security & Governance Engineer",
      "level": 35,
      "learning_repo": "security-learning",
      "solution_repo": "security-solutions",
      "aliases": [
        "AI Security Engineer",
        "ML Security Engineer",
        "AI/ML Security & Governance Engineer",
        "MLSecOps Engineer",
        "AI Security & Compliance Engineer"
      ]
    },
    {
      "id": "agentic-safety-engineer",
      "title": "Agentic Safety & Red-Team Engineer",
      "level": 40,
      "learning_repo": "agentic-safety-engineer-learning",
      "solution_repo": "agentic-safety-engineer-solutions",
      "aliases": [
        "Agentic Safety Engineer",
        "AI Red-Team Engineer",
        "AI Safety Engineer",
        "LLM Red Team"
      ]
    },
    {
      "id": "senior-ai-governance-architect",
      "title": "Senior AI Governance / Risk Architect",
      "level": 50,
      "learning_repo": "senior-ai-governance-architect-learning",
      "solution_repo": "senior-ai-governance-architect-solutions",
      "aliases": [
        "Senior AI Governance Architect",
        "AI Risk Architect",
        "Principal AI Governance Engineer",
        "AI Assurance Architect"
      ]
    },
    {
      "id": "head-of-ai-governance",
      "title": "Head of AI Governance",
      "level": 60,
      "learning_repo": "head-of-ai-governance-learning",
      "solution_repo": "head-of-ai-governance-solutions",
      "aliases": [
        "Head of AI Governance",
        "Director of AI Governance",
        "Head of Responsible AI",
        "AI Risk & Governance Lead"
      ]
    },
    {
      "id": "chief-ai-officer",
      "title": "Chief AI Officer",
      "level": 70,
      "learning_repo": "chief-ai-officer-learning",
      "solution_repo": "chief-ai-officer-solutions",
      "aliases": [
        "Chief AI Officer",
        "Head of AI",
        "VP of AI",
        "Head of AI Governance",
        "Director of AI Strategy"
      ]
    }
  ]
}
