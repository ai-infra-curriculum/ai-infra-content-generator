{
  "org": "AI-Infra-Curriculum",
  "default_remote": "git@github.com:AI-Infra-Curriculum/{repo}.git",
  "release": {
    "tag_format": "v%Y.%m",
    "branch": "main",
    "package_workflow": "release-package.yml"
  },
  "extra_repos": [
    {
      "name": ".github",
      "kind": "org-profile",
      "release": false
    },
    {
      "_comment": "Standalone guidebook repo; carries author guidance but not curriculum modules. Released alongside the curriculum to keep version pins coherent.",
      "name": "ai-agent-guidebook",
      "kind": "guidebook",
      "release": true
    },
    {
      "_comment": "The AICG runner itself. Listed so it gets the maintainer footer + audits like every other repo. release=false so monthly-release does NOT tag it — versions are driven by the runner's own pyproject.",
      "name": "ai-infra-content-generator",
      "kind": "runner",
      "release": false
    }
  ],
  "maintained_by": {
    "_comment": "Project maintainership attribution. Used by aicg org rebrand to write the footer, and by the audits to treat references to these orgs as legitimate (not 'orphan'). Distinct from the source policy for curriculum content — those rules are unchanged.",
    "name": "VeriSwarm.ai",
    "url": "https://veriswarm.ai",
    "phrasing": "Maintained by [VeriSwarm.ai](https://veriswarm.ai)",
    "footer_marker": "<!-- aicg:maintained-by -->"
  },
  "documentation": {
    "format_guard_files": [
      "CURRICULUM.md",
      "CURRICULUM_INDEX.md",
      "README.md",
      "VERSIONS.md"
    ],
    "org_readme_repo": ".github",
    "org_readme_files": [
      "README.md",
      "profile/README.md"
    ]
  },
  "schedules": {
    "monthly_release": "0 2 1 * *",
    "monthly_research": "30 5 1 3,6,9,12 *",
    "weekly_audit": "0 3 * * 0",
    "daily_remediate": "0 * * * *",
    "daily_issues": "20 4 * * *",
    "daily_steward": "40 4 * * *",
    "daily_discussions": "0 5 * * *",
    "monthly_review": "0 6 1 3,6,9,12 *"
  },
  "automation": {
    "state_dir": ".aicg/org",
    "lock_name": "aicg-org.lock",
    "auto_merge": false,
    "max_daily_work_items": 1,
    "_comment_daily_drain": "True = drain queue per tick until empty / wall-clock cap; False = exactly one item per tick.",
    "daily_drain": false,
    "agent": {
      "provider": "openai",
      "model": "codex-gpt-5.5",
      "interface": "local_cli_subscription",
      "agent_command": "{runner}/scripts/run-codex-control.sh --model codex-gpt-5.5 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}",
      "purpose": "repo orchestration, audits, validation, PR/issue/discussion stewardship, and scheduler control"
    }
  },
  "content_generation": {
    "agent": {
      "provider": "anthropic",
      "model": "claude-opus-4-7",
      "interface": "local_cli_subscription",
      "purpose": "curriculum, solution, job-requirement, and supplemental content generation",
      "agent_command": "{runner}/scripts/run-claude-content.sh --model claude-opus-4-7 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}"
    }
  },
  "job_requirements": {
    "ownership_strategy": "lowest_level_role",
    "markdown_file": "JOB_REQUIREMENTS.md",
    "structured_file": ".aicg/job-requirements.json",
    "supplemental_dir": "supplemental"
  },
  "research": {
    "agent": {
      "provider": "anthropic",
      "model": "claude-opus-4-7",
      "interface": "local_cli_subscription",
      "purpose": "quarterly job-market research with web tools enabled",
      "agent_command": "{runner}/scripts/run-claude-research.sh --model claude-opus-4-7 --prompt {prompt} --output-dir {output_dir} --repo {repo} --work-id {work_id}"
    },
    "minimum_postings_per_role": 25,
    "source_window_days": 90,
    "caps": {
      "_comment": "Per role, per research run. Anything above the cap is rejected with a 'cap_exceeded' reason and surfaced in the proposal PR so a human can decide whether to raise the cap or trim the list.",
      "max_modules_per_run": 1,
      "max_exercises_per_run": 3,
      "max_projects_per_run": 0
    },
    "min_evidence_count": 3,
    "min_evidence_window_days": 90
  },
  "roles": [
    {
      "id": "junior-engineer",
      "title": "Junior AI Infrastructure Engineer",
      "level": 10,
      "learning_repo": "ai-infra-junior-engineer-learning",
      "solution_repo": "ai-infra-junior-engineer-solutions"
    },
    {
      "id": "engineer",
      "title": "AI Infrastructure Engineer",
      "level": 20,
      "learning_repo": "ai-infra-engineer-learning",
      "solution_repo": "ai-infra-engineer-solutions"
    },
    {
      "id": "senior-engineer",
      "title": "Senior AI Infrastructure Engineer",
      "level": 30,
      "learning_repo": "ai-infra-senior-engineer-learning",
      "solution_repo": "ai-infra-senior-engineer-solutions"
    },
    {
      "id": "ml-platform",
      "title": "AI/ML Platform Engineer",
      "level": 30,
      "learning_repo": "ai-infra-ml-platform-learning",
      "solution_repo": "ai-infra-ml-platform-solutions"
    },
    {
      "id": "mlops",
      "title": "MLOps Engineer",
      "level": 30,
      "learning_repo": "ai-infra-mlops-learning",
      "solution_repo": "ai-infra-mlops-solutions"
    },
    {
      "id": "performance",
      "title": "AI Infrastructure Performance Engineer",
      "level": 35,
      "learning_repo": "ai-infra-performance-learning",
      "solution_repo": "ai-infra-performance-solutions"
    },
    {
      "id": "security",
      "title": "AI Infrastructure Security Engineer",
      "level": 35,
      "learning_repo": "ai-infra-security-learning",
      "solution_repo": "ai-infra-security-solutions"
    },
    {
      "id": "team-lead",
      "title": "AI Infrastructure Team Lead",
      "level": 40,
      "learning_repo": "ai-infra-team-lead-learning",
      "solution_repo": "ai-infra-team-lead-solutions"
    },
    {
      "id": "architect",
      "title": "AI Infrastructure Architect",
      "level": 45,
      "learning_repo": "ai-infra-architect-learning",
      "solution_repo": "ai-infra-architect-solutions"
    },
    {
      "id": "principal-engineer",
      "title": "Principal AI Infrastructure Engineer",
      "level": 50,
      "learning_repo": "ai-infra-principal-engineer-learning",
      "solution_repo": "ai-infra-principal-engineer-solutions"
    },
    {
      "id": "senior-architect",
      "title": "Senior AI Infrastructure Architect",
      "level": 55,
      "learning_repo": "ai-infra-senior-architect-learning",
      "solution_repo": "ai-infra-senior-architect-solutions"
    },
    {
      "id": "principal-architect",
      "title": "Principal AI Infrastructure Architect",
      "level": 60,
      "learning_repo": "ai-infra-principal-architect-learning",
      "solution_repo": "ai-infra-principal-architect-solutions"
    }
  ]
}
